<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <a href="https://crossi-dev.github.io/carlos" class="back-link">← Portfolio</a>

  <div class="container">

    <header>
      <h1>Tasks</h1>
      <span class="task-count" id="taskCount">0 remaining</span>
    </header>

    <form id="taskForm">
      <input type="text" id="taskInput" placeholder="Add a task..." autocomplete="off" />
      <button type="submit">Add</button>
    </form>

    <div class="filters">
      <button class="filter active" data-filter="all">All</button>
      <button class="filter" data-filter="active">Active</button>
      <button class="filter" data-filter="completed">Completed</button>
    </div>

    <ul id="taskList"></ul>

    <footer>
      <span id="completedCount">0 completed</span>
      <button id="clearCompleted">Clear completed</button>
    </footer>

  </div>

  <script src="main.js"></script>
</body>
</html>
